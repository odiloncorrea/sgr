<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Tipos</h2>
    <a class="btn btn-primary" routerLink="/tipos/cadastrar">Novo </a>
</div>

@if (mensagemErro) {
<div class="alert alert-danger">
    {{ mensagemErro }}
</div>
}

<div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Descrição</th>
                <th class="text-center">Ações</th>
            </tr>
        </thead>

        <tbody>
            @for (tipo of tipos; track tipo.id) {                
            <tr>
                <td class="w-75">{{ tipo.descricao }}</td>
                <td class="w-25 text-center">
                    <a class="btn btn-warning btn-sm me-2" [routerLink]="['/tipos/alterar', tipo.id]"> Alterar </a>
                    
                    <button type="button" class="btn btn-danger btn-sm" (click)="excluir(tipo.id!)"> Excluir </button>
                </td>                
            </tr>
            } @empty {
            <tr>
                <td colspan="2" class="text-center">
                    Nenhum tipo cadastrado.
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
